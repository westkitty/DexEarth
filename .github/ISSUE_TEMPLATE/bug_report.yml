name: Bug Report
description: Something is broken
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Fill in what you can. Screenshots always help.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: What did you expect vs. what actually happened?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open the app
        2. Toggle FIBER_CABLES layer
        3. See error in console
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser and OS
      placeholder: Chrome 124, macOS 14
    validations:
      required: true

  - type: textarea
    id: console
    attributes:
      label: Console errors (if any)
      render: shell
